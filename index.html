<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maktab O‘qituvchilari Albomi</title>
    <link rel="stylesheet" href="./main.css">
    <script src="./main.js"></script>
</head>
<body>

<div class="album-container">
    <h1>MAKTAB O‘QITUVCHILARI</h1>
    <p class="year-badge">2024–2025 o'quv yili</p>

    <div class="top-section">
        <div class="card main-card">
            <img src="/photo_6_2026-01-19_21-16-17.jpg" alt="Direktor">
            <div class="info">
                <h3>Direktor</h3>
                <p>Ism Familiya</p>
            </div>
        </div>
        <div class="card main-card">
            <img src="/photo_7_2026-01-19_21-16-17.jpg" alt="O'rinbosar">
            <div class="info">
                <h3>Direktor o‘rinbosari</h3>
                <p>Ism Familiya</p>
            </div>
        </div>
        <div class="card main-card">
            <img src="images/t3.jpg" alt="Sinf rahbari">
            <div class="info">
                <h3>Sinf rahbari</h3>
                <p>Ism Familiya</p>
            </div>
        </div>
        <div class="card main-card">
            <img src="images/t4.jpg" alt="O'qituvchi">
            <div class="info">
                <h3>Mas’ul o‘qituvchi</h3>
                <p>Ism Familiya</p>
            </div>
        </div>
    </div>

    <hr class="gold-line">

    <div class="teachers-grid">
        <div class="card small-card">
            <img src="/photo_8_2026-01-19_21-16-17.jpg" alt="O'qituvchi">
            <p class="name">Aliyev Aziz</p>
        </div>
        <div class="card small-card"><img src="images/s2.jpg" alt="O'qituvchi"><p class="name">Karimova Dilnoza</p></div>
        <div class="card small-card"><img src="images/s3.jpg" alt="O'qituvchi"><p class="name">Ismoilov Bekzod</p></div>
        </div>
</div>

<div id="imageModal" class="modal">
    <span class="close-btn">&times;</span>
    <div class="modal-body">
        <img id="modalImg" src="" alt="Full view">
        <h2 id="modalCaption"></h2>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
